version: '1'
name: 'FiveM Framework'
author: 'sponex75'
description: 'Comprehensive FiveM Framework with Job, Inventory, Banking, Vehicles, Police and NPC systems'

variables:
  serverName:
    label: 'Server Name'
    description: 'What should your server be called?'
    type: 'string'
    default: 'FiveM Framework Server'

  maxPlayers:
    label: 'Max Players'
    description: 'Maximum number of players'
    type: 'number'
    default: 128

resources:
  - fiveM-framework

metadata:
  minimumVersion: '4432'
  tags:
    - 'framework'
    - 'fivem'
    - 'jobs'
    - 'inventory'
    - 'banking'
    - 'vehicles'
    - 'police'
    - 'npc'
    - 'ui'
    - 'gta5'

homepage: 'https://github.com/sponex75/fiveM-framework'
repository: 'https://github.com/sponex75/fiveM-framework'
